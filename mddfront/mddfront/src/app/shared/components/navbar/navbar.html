
<!-- Checkbox caché = interrupteur du menu mobile -->
<input type="checkbox" id="menu-toggle" class="menu-toggle-input" />
 
<nav class="navbar">
  <!-- Logo -->
  <div class="navbar-left">
    <img src="assets/logo.png" class="navbar-logo" routerLink="/feed" alt="MDD Logo" />
  </div>
 
  <!-- Bouton hamburger (label lié au checkbox) -->
  <label for="menu-toggle" class="menu-btn mobile-only" aria-label="Ouvrir le menu">
    <mat-icon>menu</mat-icon>
  </label>
 
  <!-- Menu desktop -->
  <div class="navbar-right desktop-only">
    <a routerLink="/logout" class="nav-link logout">Se déconnecter</a>
    <a routerLink="/feed" class="nav-link" routerLinkActive="active-link">Articles</a>
    <a routerLink="/subjects" class="nav-link" routerLinkActive="active-link">Thèmes</a>
    <a routerLink="/profile" mat-icon-button class="profile-btn" aria-label="Profil">
      <mat-icon>account_circle</mat-icon>
    </a>
  </div>
</nav>
 
<!-- Menu mobile : visible quand le checkbox est coché -->
<div class="mobile-menu mobile-only">
  <a routerLink="/feed"><mat-icon>article</mat-icon> Articles</a>
  <a routerLink="/subjects"><mat-icon>topic</mat-icon> Thèmes</a>
  <a routerLink="/profile"><mat-icon>account_circle</mat-icon> Profil</a>
  <a routerLink="/logout" class="logout"><mat-icon>logout</mat-icon> Se déconnecter</a>
</div>
